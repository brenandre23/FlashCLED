# Run: python -m pipeline.analysis.generate_explanations --shap-export
shap:
  enabled: true
  sample_ratio: 0.1          # Subsample rows for performance (0.1 = 10%)
  top_k: 8                   # Number of top features to return per cell
  background_size: 200       # Background samples for KernelExplainer
  horizons: null             # null = all horizons; or list like ["14d", "3m"]
  learners: null             # null = all learners; or list like ["xgboost"]
  # Theme mapping for frontend color-coding
  theme_map:
    environment:
      - chirps_
      - era5_
      - ndvi
      - soil_moisture
      - nightlights
      - temp
      - precip
      - ntl_
      - water_
      - landcover_
    past_conflict:
      - fatalities
      - protest
      - riot
      - regional_risk_score
      - mech_
      - acled_combined
    gdelt_news:
      - gdelt_
      - crisiswatch_
      - acled_topic_
      - cw_score
      - regime_
      - narrative_velocity
      - fusion_
    markets:
      - price_
      - maize
      - rice
      - cassava
      - sorghum
      - groundnuts
      - oil_price
      - gold_price
      - sp500
      - eur_usd
      - food_price
    displacement:
      - iom_displacement
    population:
      - pop_
      - population
    distance:
      - dist_to_
      - distance_
      - terrain_ruggedness
      - elevation
      - slope
    admin:
      - admin1
      - admin2
      - admin3
    temporal:
      - month_sin
      - month_cos
      - is_dry_season
    pca:
      - pca_
    ioda:
      - ioda_
    epr:
      - epr_
      - ethnic_group

# =================================================================
# FEATURE IMPORTANCE MONITORING
# =================================================================
# Track whether NLP features are being discovered after enabling stochasticity
feature_monitoring:
  enabled: true
  nlp_features:
    # CrisisWatch
    - cw_score_local
    - cw_score_local_lag1
    - cw_score_local_spatial_lag
    - narrative_velocity_lag1
    - regime_parallel_governance
    - regime_transnational_predation
    - regime_guerrilla_fragmentation
    - regime_ethno_pastoral_rupture
    # ACLED Hybrid (mech_* schema)
    - mech_gold_pivot_lag1
    - mech_predatory_tax_lag1
    - mech_factional_infighting_lag1
    - mech_collective_punishment_lag1
    - acled_combined_risk_score_lag1
    # GDELT fusion
    - gdelt_shock_signal
  # Alert if NLP features contribute less than this threshold
  min_nlp_importance_pct: 5.0

# =================================================================
# STABILITY PRUNING CONFIGURATION
# =================================================================
pruning:
  enabled: true
  output_path: "configs/pruned_features.yaml"
  
  # Scientific Definition of the "Training Era" for Stability
  training_window:
    start_date: "2015-02-18"  # Start when GDELT/Modern NLP is available
    end_date: "2022-12-31"    # Capture more recent conflict dynamics
  
  # Multi-Objective Pruning (Union of Stable Sets)
  objectives:
    # Objective A: Fatality onset (binary)
    - target: "target_binary_1_step"
      type: "binary"
      threshold: 0.2       # RELAXED: feature must be useful >20% of the time (1/5 folds)
      
    # Objective B: Fatality intensity (counts)
    - target: "fatalities_14d_sum"
      type: "count"
      threshold: 0.2       # RELAXED: capture rare intensity signals (approx 1/5 of the time)

# =================================================================
# SHAP EXPORT CONFIGURATION
# =================================================================
shap:
  enabled: true
  sample_ratio: 0.1          # Increased to 10% for decent map coverage
  top_k: 8                   # Number of top features to return per cell
  background_size: 20        # Aggressively reduced for 10x speedup vs original
  horizons: null             # Optional filter, e.g., ["14d", "1m"]; null = all
  learners: null             # Optional filter, e.g., ["xgboost"]; null = all
  theme_map:                 # Prefix-based theme buckets for grouping features
    environment: ["chirps_", "era5_", "ndvi", "soil_moisture", "rain", "temp"]
    conflict_history: ["fatalities", "acled_count_", "protest", "riot", "regional_risk"]
    nlp: ["cw_", "regime_", "narrative_", "mech_", "fusion_"]
    market: ["price_", "food_price_index", "oil_price", "gold_price", "econ"]
    displacement: ["iom_", "displacement"]
    nightlights: ["ntl_"]
    landcover: ["landcover_", "water_local"]
    geography: ["dist_to_", "elevation", "slope", "terrain"]
    population: ["pop_"]
    internet: ["ioda_"]
    seasonality: ["month_", "is_dry_season"]
    other: []
