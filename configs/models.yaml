# configs/models.yaml
# =================================================================
# MODELING CONFIGURATION
# =================================================================
# Updated: 2026-01-23
# Changes: 
#   - Mandatory stochastic gradient boosting (subsample + colsample_*)
#   - Replaced legacy driver_* with new mech_* schema
#   - Added acled_combined_risk_score for aggregate risk signal

horizons:
- name: 14d
  steps: 1
- name: 1m
  steps: 2
- name: 3m
  steps: 6

# Sigmoid (Platt) calibration for probability reliability (isotonic optional)
# CENTRALIZED CALIBRATION POLICY - Single source of truth for all calibration splits
calibration:
  method: none                # UPDATED: Trust the XGBoost Meta-Learner (Reduces variance collapse)
  split_method: temporal_tail # Standardized split
  fraction: 0.0               # Use 100% of training data for stacking
  min_positive_events: 10     # Minimum positive cases required in calibration set
  fallback_fraction: 0.3      # Fallback fraction if min_positive_events not met
  random_seed: 42             # Seed for reproducible random splits

# Bin-Conditional Conformal Prediction for uncertainty intervals
# Reference: Randahl, Williams & Hegre (2026), Political Analysis
conformal_prediction:
  enabled: true
  alpha: 0.1          # Significance level (0.1 = 90% coverage target)
  contiguous: true    # Merge discontiguous intervals (slightly over-covers but cleaner)
  log_scale: true     # Work on log1p(fatalities) scale
  # Bins following ViEWS/paper convention (exponentially increasing)
  bins: [0, 1, 3, 8, 21, 55, 149, .inf]

hurdle_params:
  classifier_scale_pos_weight: 18  # Reduced from 35 (was ~sqrt(950)); 18 makes base models
                                    # more conservative, giving meta-learner cleaner signal.

# =================================================================
# META-LEARNER (LEVEL 2 STACKING)
# =================================================================
# Logistic: Interpretable macro-coefficients.
# XGBoost: Captures non-linear cross-theme interactions (e.g., Conflict x NLP).
# -----------------------------------------------------------------
# CALIBRATION NOTES (2026-02-19):
#   Previous run: C=1.0, class_weight='balanced' → extreme coefficients
#   (temporal_context=-41.8, broad_pca=+16.5) caused probability floor ~0.09
#   for ALL cells in OOS period, collapsing PR-AUC to 0.07.
#
#   Fix: C=0.1 adds L2 regularization (10x stronger), shrinking extreme coefs.
#   class_weight removed: sub-models already account for imbalance via
#   scale_pos_weight=18; double-correcting inflates the floor further.
# =================================================================
meta_learner:
  type: "logistic"  # FINAL SELECTION (2026-02-20): Logistic won head-to-head +12% PR-AUC.
                    # C=0.1 L2 regularization shrinks weak sub-model coefficients toward zero,
                    # effectively gating noise inputs. Sub-models handle imbalance via spw=18;
                    # class_weight=null avoids double-correction that inflates probability floor.
  params:
    C: 0.1
    class_weight: null
    max_iter: 2000
    random_state: 42
  # --- XGBoost meta (archived — lost head-to-head, overfits noise sub-model dims) ---
  # params:
  #   n_estimators: 50
  #   max_depth: 3
  #   learning_rate: 0.05
  #   scale_pos_weight: 8
  #   subsample: 0.8
  #   colsample_bytree: 0.8
  #   random_state: 42

# =================================================================
# LEARNERS (Stochastic Gradient Boosting - MANDATORY)
# =================================================================
# RATIONALE:
# 1. subsample (Row Randomness): Prevents overfitting to outliers (mass casualty
#    events). Each tree trains on 80% of data, providing robustness without
#    external bagging overhead.
#
# 2. colsample_bytree (Feature Randomness): CRITICAL for NLP feature discovery.
#    Without this, dominant autoregressive features (fatalities_lag1) will
#    monopolize all splits. By hiding 30% of features per tree, we force the
#    model to learn from weaker NLP signals (cw_score_local, narrative_velocity).
#
# 3. colsample_bylevel (Per-Level Dropout): Additional regularization that
#    prevents any single feature from dominating at every tree level.
#
# External bagging is NOT used because:
# - Bin-Conditional Conformal Prediction (BCCP) provides proper uncertainty
# - Bagging variance != calibrated prediction intervals
# - 10x computational overhead for marginal benefit
# =================================================================
learners:
  xgboost:
    type: xgboost
    params:
      # --- CORE ARCHITECTURE ---
      tree_method: "hist"
      n_jobs: 1
      
      # --- STOCHASTIC GRADIENT BOOSTING ---
      subsample: 0.8            # Keep row randomness for general robustness
      colsample_bytree: 0.85    # INCREASED: Trust the pruned feature set more
      colsample_bylevel: 0.9    # Keep level dropout to protect NLP signals
      
      # --- TREE STRUCTURE ---
      n_estimators: 350         # INCREASED: Slower, more careful learning
      learning_rate: 0.03       # DECREASED: Balances the deeper trees
      max_depth: 8              # INCREASED: Capture complex interactions (Conflict x NLP x Env)
      min_child_weight: 5       # DECREASED: Allow learning from smaller, valid clusters
      
      # --- REGULARIZATION ---
      gamma: 1.0
      reg_alpha: 0.1
      reg_lambda: 1.0

  lightgbm:
    type: lightgbm
    params:
      # --- CORE ARCHITECTURE ---
      num_threads: 1
      verbose: -1
      
      # --- STOCHASTIC GRADIENT BOOSTING ---
      subsample: 0.8
      subsample_freq: 1
      colsample_bytree: 0.85    # INCREASED
      
      # --- TREE STRUCTURE ---
      n_estimators: 350         # INCREASED
      learning_rate: 0.03       # DECREASED
      num_leaves: 50            # INCREASED: Approx depth 7-8 equivalent
      max_depth: -1
      min_child_samples: 10     # DECREASED: More sensitive to rare events
      
      # --- REGULARIZATION ---
      reg_alpha: 0.1
      reg_lambda: 1.0

# =================================================================
# SUB-MODELS
# =================================================================
# Updated: 2026-01-23 - Replaced legacy driver_* with mech_* schema
# =================================================================
submodels:
  conflict_history:
    enabled: true
    features:
    - fatalities_lag1           # Lagged intensity signal
    - protest_count_lag1       # Civil unrest signal
    - riot_count_lag1          # Violent demonstration signal
    - gdelt_event_count        # Event volume (news)
    - regional_risk_score_lag1

  economics:
    enabled: true   # Full candidate list. pruned_features.yaml is the gate — only features
                    # present in that file will survive the intersection in build_theme_models().
    features:
    - price_maize
    - price_maize_recency_days
    - price_maize_shock
    - price_rice
    - price_rice_recency_days
    - price_rice_shock
    - price_oil                # Local cooking oil
    - price_oil_recency_days
    - price_oil_shock          # Composite food security signal
    - price_sorghum
    - price_sorghum_recency_days
    - price_sorghum_shock
    - price_cassava
    - price_cassava_recency_days
    - price_cassava_shock
    - price_groundnuts
    - price_groundnuts_recency_days
    - price_groundnuts_shock
    - gold_price_usd_lag1
    - oil_price_usd_lag1       # Global crude oil price
    - eur_usd_rate_lag1        # Purchasing power parity
    - food_price_index
    - food_price_index_recency_days
    - food_data_available      # Structural break: FEWS NET coverage guard

  environmental:
    enabled: true
    features:
    - chirps_precip_anomaly
    - chirps_precip_mean
    - era5_temp_anomaly
    - era5_temp_mean
    - era5_dewpoint_anomaly
    - era5_dewpoint_mean
    - era5_soil_moisture_anomaly
    - era5_soil_moisture_mean
    - ndvi_anomaly
    - ndvi_max
    # --- VIIRS Nighttime Lights (Integrated Strategy) ---
    - ntl_mean                 # Stable infrastructure baseline (gap-filled mean)
    - ntl_peak                 # Raw max: Fire/explosion transients
    - ntl_stale_days           # Uncertainty: Days since last HQ observation
    - ntl_trust_frac           # Fraction of HQ retrievals (quality)
    - ntl_kinetic_delta        # Derived: Peak - Mean (fire proxy, clipped >= 0)
    - viirs_data_available     # Structural break flag (date + data guard)
    # --- Surface Water ---
    - water_local_max
    - water_local_mean
    # --- Land Cover (Dynamic World) ---
    - landcover_grass
    - landcover_crops
    - landcover_trees
    - landcover_bare
    - landcover_built
    - landcover_data_available
    - dist_to_market_km        # Access/Infrastructure overlap

  epr:
    enabled: true
    features:
    - epr_excluded_groups_count
    - epr_discriminated_groups_count # Active discrimination
    - ethnic_group_count             # Diversity proxy
    - epr_status_mean
    - iom_displacement_count_lag1    # Displacement dynamics
    - iom_displacement_sum_recency_days    # Freshness of displacement data

  demographic:
    enabled: true
    features:
    - pop_log
    - is_worldpop_v1           # Structural break flag

  terrain:
    enabled: true
    features:
    - elevation_mean
    - slope_mean
    - terrain_ruggedness_index
    - dist_to_road
    - dist_to_capital          # Core-periphery dynamics
    - dist_to_border           # Transnational spillover risk
    - dist_to_river
    - dist_to_diamond_mine
    - dist_to_gold_mine
    - dist_to_city             # Market access proxy (moved from economics)

  temporal_context:
    enabled: true   # Full candidate list. pruned_features.yaml controls which survive:
                    # month_sin/cos removed (in-sample seasonal artifact, OOS ROC-AUC=0.49).
                    # is_dry_season retained in pruned set: theoretically grounded for CAR.
    features:
    - month_sin
    - month_cos
    - is_dry_season

  nlp_acled:
    enabled: true
    features:
    - mech_gold_pivot_lag1
    - mech_predatory_tax_lag1
    - mech_factional_infighting_lag1
    - mech_collective_punishment_lag1
    - acled_combined_risk_score_lag1

  nlp_crisiswatch:
    enabled: false  # DISABLED 2026-02-20: PR-AUC=0.0079 (1.6× random baseline) — noise
    features:
    - cw_score_local
    - cw_score_local_lag1
    - cw_score_local_spatial_lag
    - regime_parallel_governance
    - regime_transnational_predation
    - regime_guerrilla_fragmentation
    - regime_ethno_pastoral_rupture
    - narrative_velocity_lag1

  nlp_gdelt:
    enabled: false  # REMOVED 2026-02-19: ROC-AUC=0.487 (below random); meta-learner
                    # assigned negative coefficient (-1.3) — net noise, not signal.
                    # gdelt_event_count retained in conflict_history sub-model.
    features:
    - gdelt_avg_tone_decay_30d
    - gdelt_decay_30d
    - gdelt_goldstein_mean
    - gdelt_mentions_total
    - gdelt_event_count
    - ioda_outage_score
    - gdelt_shock_signal

  nlp_interactions:
    enabled: true
    features:
    - cw_onset_amplifier
    - cw_mass_casualty_risk
    - cw_extraction_violence
    - cw_pastoral_predation
    - fusion_gold_signal
    - fusion_fragmentation_confirmed
    - fusion_escalation_momentum

  broad_pca:
    enabled: true
    variance_retention: 0.95
    features: []

# =================================================================
