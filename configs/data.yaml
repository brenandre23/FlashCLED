# configs/data.yaml
# =================================================================
# DATA SOURCE CONFIGURATION
# =================================================================

# --- GLOBAL DATE CONTROL ---
global_date_window:
  start_date: "2000-01-01"
  end_date: "2025-12-31"

# --- STRUCTURAL BREAK DATES (Centralized Source of Truth) ---
# NOTE (Audit Fix 2026-01-27): Updated from actual MIN(date) in database
# Query: scripts/audit_source_dates.sql
structural_breaks:
  # Environmental (GEE sources have different starts within same table)
  era5_chirps: "2000-01-01"    # ERA5/CHIRPS coverage (environmental_features)
  viirs: "2012-01-28"          # VIIRS sensor launch (subset of environmental_features)
  
  # Conflict & News
  acled: "2000-01-10"          # ACLED events for CAR
  acled_hybrid: "2000-01-15"   # ACLED Hybrid NLP features (features_acled_hybrid)
  gdelt: "2015-02-18"          # GDELT v2 start (features_dynamic_daily)
  crisiswatch: "2003-08-01"    # CrisisWatch NLP (features_crisiswatch)
  
  # Land Cover
  dynamic_world: "2017-04-01"  # Actual start in landcover_features (was 2017-03-07)
  
  # Socio-Economic
  economy: "2003-12-01"        # Yahoo Finance (economic_drivers)
  food_security: "2018-01-31"  # FEWS NET (food_security) - CORRECTED from 2015-01-01
  iom: "2018-01-31"            # IOM DTM CAR coverage (iom_dtm_raw, iom_displacement_h3)
  
  # Infrastructure
  ioda: "2022-01-01"           # IODA monitoring (internet_outages) - CORRECTED from 2022-02-01

# --- MODEL TRAINING SPLITS ---
split:
  test_year: 2023
  validation_years: [2021, 2022, 2024, 2025]
  train_cutoff: "2024-01-01"  # Matches hardcoded split_date in train_single_model.py:364

# --- VALIDATION ---
validation:
  run_assertions: true

# --- SPATIAL BOUNDING BOX ---
car_bbox: [14.0, 2.0, 28.0, 11.5]

# =================================================================
# DATASETS
# =================================================================

# 1. CONFLICT & EVENTS
acled:
  local_file: "data/raw/acled.csv"
  country: "Central African Republic"

gdelt:
  bq_dataset: "gdelt-bq.gdeltv2.events"
  country_iso3: "CF"

# 2. ENVIRONMENTAL (Cloud APIs)
gee:
  project_id: "thesis-project-478503"
  collections:
    chirps: "UCSB-CHG/CHIRPS/DAILY"
    era5: "ECMWF/ERA5_LAND/HOURLY"
    modis: "MODIS/061/MCD43A4"
    viirs: "NASA/VIIRS/002/VNP46A2"

era5_cds:
  product: "reanalysis-era5-land"
  variables: ["2m_temperature", "2m_dewpoint_temperature"]
  hours: ["00:00", "06:00", "12:00", "18:00"]

# 3. SOCIO-POLITICAL
epr:
  geoepr_url: "https://icr.ethz.ch/data/epr/geoepr/GeoEPR-2021.geojson"
  core_url: "https://icr.ethz.ch/data/epr/core/EPR-2021.csv"

iom_dtm:
  country_name: "Central African Republic"
  base_url: "https://dtmapi.iom.int/v3"
  local_file: "iom_displacement_data_raw.csv"

fews_net:
  iso2: "CF"
  iso3: "CAF"
  markets_geojson_url: "https://fdw.fews.net/api/feature/?format=geojson&unit_set_version=3380"
  fallback_region_bundle: ""

wfp_vam:
  market_api_url: "https://api.vam.wfp.org/"
  country_iso3: "CAF"

# 4. INFRASTRUCTURE & GEOGRAPHY
world_bank_boundary:
  iso3: "CAF"
  url: "https://datacatalogfiles.worldpop.org/ddh-published-v2/0038272/5/DR0095369/World%20Bank%20Official%20Boundaries%20(GeoJSON)/World%20Bank%20Official%20Boundaries%20-%20Admin%200.geojson"
  filter_property: "ISO_A3"

admin_boundaries:
  region_boundary: "data/raw/regions.geojson"          # Admin 1 (Regions) - legacy WB (17 units)
  prefecture_boundary: "data/raw/prefectures.json"          # Admin 2 (Prefectures) - 2021 standard (20 units)
  subprefecture_boundary: "data/raw/subprefectures.json"    # Admin 3 (Subprefectures) - 2021 standard (72 units)
  url: "https://datacatalog.worldbank.org/search/dataset/0038272/World-Bank-Official-Boundaries"

population:
  base_url_v2: "https://data.worldpop.org/GIS/Population/Global_2015_2030/R2025A"
  filename_template_v2: "caf_pop_{year}_CN_100m_R2025A_v1.tif"

copernicus:
  token_url: "https://identity.dataspace.copernicus.eu/auth/realms/CDSE/protocol/openid-connect/token"
  process_api_url: "https://sh.dataspace.copernicus.eu/api/v1/process"
  dem_instance: "COPERNICUS_90"

grip4:
  region3_url: "https://dataportaal.pbl.nl/downloads/GRIP4/GRIP4_Region3_vector_shp.zip"

hydrorivers:
  url: "https://data.hydrosheds.org/file/HydroRIVERS/HydroRIVERS_v10_af_shp.zip"
  min_stream_order: 3

osm:
  settlements_hdx_url: "https://data.humdata.org/dataset/27db004a-4f10-4046-a561-c0b0aea98ef0/resource/6d28d003-333c-442c-9d39-6903bb264814/download/caf_settlements_sigcaf.zip"

# 5. ECONOMY
ipis_mines:
  wfs_url: "https://geo.ipisresearch.be/geoserver/public/caf_mines_curated_all_opendata_p_ipis/wfs"
  type_name: "public:caf_mines_curated_all_opendata_p_ipis"

commodities:
  oil_series_id: "PET.RBRTE.D"

ioda:
  source_url: "https://api.ioda.inetintel.cc.gatech.edu/v2"
  variable: "ioda_outage_score"
  entity_code: "CF"
  description: "Outage event score aggregated over 14d windows. IODA events available nationally from 2022 onward; regional detail unavailable for CAR."
