    source: ACLED_Hybrid
    transformation: none
    output_col: mech_gold_pivot_uncertainty
  - raw: mech_predatory_tax_uncertainty
    source: ACLED_Hybrid
    transformation: none
    output_col: mech_predatory_tax_uncertainty
  - raw: mech_factional_infighting_uncertainty
    source: ACLED_Hybrid
    transformation: none
    output_col: mech_factional_infighting_uncertainty
  - raw: mech_collective_punishment_uncertainty
    source: ACLED_Hybrid
    transformation: none
    output_col: mech_collective_punishment_uncertainty

  # ACLED hybrid summary scores
