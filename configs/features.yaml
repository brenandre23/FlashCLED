    source: ACLED_Hybrid
    transformation: none
    output_col: mech_gold_pivot_lag1
  - raw: mech_predatory_tax_lag1
    source: ACLED_Hybrid
    transformation: none
    output_col: mech_predatory_tax_lag1
  - raw: mech_factional_infighting_lag1
