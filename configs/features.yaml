# =============================================================================
# FEATURES CONFIGURATION
# =============================================================================
# Diagnostic settings, spatial/temporal definitions, and the master feature registry.

# =============================================================================
# 1. DIAGNOSTICS & EXCLUSIONS
# =============================================================================
diagnostics:
  # Structural break flags: Binary (0/1) columns indicating data availability
  # These are excluded from diagnostics by default when using --exclude-structural-breaks
  structural_break_flags:
    - is_worldpop_v1              # WorldPop V1 vs V2 methodology
    - iom_data_available          # IOM DTM coverage start (2015-01-31)
    - econ_data_available         # Yahoo Finance coverage start (2003-12-01)
    - ioda_data_available         # IODA monitoring start (2022-02-01)
    - landcover_data_available    # Dynamic World start (2015-06-27)
    - viirs_data_available        # VIIRS coverage start (2012-01-28)
    - gdelt_data_available        # GDELT v2 coverage start (2015)
    - food_data_available         # FEWS NET food price coverage
  
  # Additional columns to always exclude from diagnostics
  exclude_from_diagnostics: []
  
  # Thresholds for diagnostic flagging
  thresholds:
    vif_warning: 5.0              # VIF > 5 = moderate collinearity
    vif_severe: 10.0              # VIF > 10 = severe collinearity
    correlation_warning: 0.7      # |rho| > 0.7 = moderate correlation
    correlation_severe: 0.9       # |rho| > 0.9 = severe correlation
    condition_number: 30.0        # Condition number > 30 = ill-conditioned

# =============================================================================
# 2. SPATIAL & TEMPORAL DEFINITIONS
# =============================================================================
spatial:
  crs:
    metric: EPSG:32634
    geodetic: EPSG:4326
  h3_resolution: 5
  buffer_km: 8.5
  admin_columns:
    admin1: NAM_1          # Regions (legacy WB admin1)
    admin2: ADM1_FR        # Prefectures (column name in prefectures.json)
    admin3: ADM2_FR        # Subprefectures (column name in subprefectures.json)

temporal:
  base_unit: step
  step_days: 14
  alignment_date: '2000-01-01'
  decays:
    half_life_30d:
      steps: 2.14
    half_life_90d:
      steps: 6.43
  
  # Publication lags by source (in steps)
  # Applied at ingestion to ensure operational validity
  publication_lags:
    GEE: 1              # ERA5 ~5-7 days, CHIRPS ~2-3 days
    DynamicWorld: 1     # Sentinel-2 ~2-5 days latency
    CHIRPS: 1
    ERA5: 1
    MODIS: 1
    VIIRS: 1
    JRC_Landsat: 1
    ACLED: 1            # ~6 day weekly release cycle
    ACLED_Hybrid: 1
    NLP_CrisisWatch: 2
    GDELT: 0            # Near real-time (<1 hour)
    Food_Security: 4    # ~45-60 day delay
    IOM_DTM: 2          # ~2-4 week delay
    Economy: 1          # End-of-day close
    IODA: 0             # Near real-time
    EPR: 0              # Static/historical
    WorldPop: 0         # Annual static
    Static_Geography: 0

# =============================================================================
# 3. IMPUTATION RULES (Stocks vs Flows Strategy)
# =============================================================================
# CRITICAL DISTINCTION (2026-01-24 Bug Fix):
#
# STOCK variables: State persists but becomes uncertain over time.
#   - Forward-fill within validity window, then PRESERVE NaN
#   - XGBoost learns optimal split direction for missing values natively
#   - Zero-filling creates phantom "resolution" events - a critical bug
#   - Examples: displacement, prices, nightlights, population
#
# FLOW variables: Discrete events that either happen or don't.
#   - Zero-fill immediately (no event recorded = no event occurred)
#   - Examples: conflict events, protests, outages
#
# Key insight: XGBoost handles NaN natively via learned optimal split direction.
# Forcing zeros destroys this capability and teaches wrong relationships.
# =============================================================================
imputation:
  defaults:
    method: "forward_fill"
    limit: 4  # Global fallback (approx 2 months)
    type: stock  # Default to stock (preserve NaN) for safety
  domains:
    # STOCK VARIABLES: Forward-fill with limit, then NaN (no zero-fill)
    environmental:
      limit: 2   # Short: Weather/NDVI change rapidly (approx 1 month)
      type: stock
    economic:
      limit: 8   # Medium: Market prices sticky (approx 4 months)
      type: stock
    social:
      limit: 12  # Long: Displacement (IOM) is structural; updated quarterly
      type: stock
    demographic:
      limit: 52  # Annual data: forward-fill up to 1 year
      type: stock
    
    # FLOW VARIABLES: Zero-fill (no event = 0)
    conflict:
      limit: 0   # ACLED events - no forward propagation
      type: flow
    news:
      limit: 0   # GDELT/CrisisWatch - preserve temporal precision
      type: flow
    outage:
      limit: 0   # IODA outages - no outage detected = no outage
      type: flow

# =============================================================================
# 4. FEATURE REGISTRY
# =============================================================================
registry:

  # ---------------------------------------------------------------------------
  # A. Environmental Drivers (Climate, Land, Light)
  # ---------------------------------------------------------------------------
  # Precipitation (CHIRPS)
  - raw: precip_mean_depth_mm
    source: CHIRPS
    transformation: anomaly
    output_col: chirps_precip_anomaly
  - raw: precip_mean_depth_mm
    source: CHIRPS
    transformation: mean
    output_col: chirps_precip_mean
  
  # Temperature & Moisture (ERA5)
  - raw: temp_mean
    source: ERA5
    transformation: anomaly
    output_col: era5_temp_anomaly
  - raw: temp_mean
    source: ERA5
    transformation: mean
    output_col: era5_temp_mean
  - raw: dew_mean
    source: ERA5
    transformation: anomaly
    output_col: era5_dewpoint_anomaly
  - raw: dew_mean
    source: ERA5
    transformation: mean
    output_col: era5_dewpoint_mean
  - raw: soil_moisture_mean
    source: ERA5
    transformation: anomaly
    output_col: era5_soil_moisture_anomaly
  - raw: soil_moisture_mean
    source: ERA5
    transformation: mean
    output_col: era5_soil_moisture_mean
  
  # Vegetation & Light (MODIS, VIIRS)
  - raw: ndvi_max
    source: MODIS
    transformation: anomaly
    output_col: ndvi_anomaly
  - raw: ndvi_max
    source: MODIS
    transformation: mean
    output_col: ndvi_max
  # --- Nighttime Lights (Integrated Strategy) ---
  # VIIRS VNP46A2: Reliability-Weighted + Kinetic-Aware approach
  # imputation_policy: pass_through ensures XGBoost handles NaN natively
  # (no zero-fill for pre-2012 structural break)
  
  - name: "NTL Stability"
    raw: ntl_mean
    source: VIIRS
    transformation: mean
    output_col: nightlights_intensity
    imputation_policy: pass_through  # XGBoost handles NaNs; do not fill
    description: "Gap-filled mean radiance. Stable infrastructure baseline."

  - name: "VIIRS Availability"
    raw: ntl_mean
    source: VIIRS
    transformation: availability_flag
    output_col: viirs_data_available
    description: "1 if date >= 2012-01-28 AND ntl_mean.notna(), else 0"

  - name: "NTL Kinetic Peak"
    raw: ntl_peak
    source: GEE
    transformation: none
    output_col: ntl_peak
    imputation_policy: pass_through  # XGBoost handles NaNs; do not fill
    description: "Maximum raw radiance. Proxy for fires/transient events."

  - name: "NTL Staleness"
    raw: ntl_stale_days
    source: GEE
    transformation: none
    output_col: ntl_stale_days
    imputation_policy: pass_through  # XGBoost handles NaNs; do not fill
    description: "Median days since last high-quality retrieval. Uncertainty metric."

  - name: "NTL Trust Fraction"
    raw: ntl_trust_frac
    source: GEE
    transformation: none
    output_col: ntl_trust_frac
    imputation_policy: pass_through  # Do not fill; represents observation density/quality
    description: "Fraction of days in window with high-quality VIIRS retrievals (Mandatory_Quality_Flag==0)."

  - name: "NTL Kinetic Delta"
    raw: derived
    source: Derived
    transformation: delta_calc
    output_col: ntl_kinetic_delta
    imputation_policy: pass_through  # NaN propagates from inputs
    description: "ntl_peak - ntl_mean, clipped >= 0. Fire/explosion proxy."

  # Surface Water (JRC)
  - raw: water_local_max
    source: JRC_Landsat
    transformation: none
    output_col: water_local_max
  - raw: water_local_mean
    source: JRC_Landsat
    transformation: none
    output_col: water_local_mean

  # Land Cover Fractions (Dynamic World)
  - name: "Grassland Fraction"
    raw: dw_grass_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_grass
    description: "Grassland/savanna fraction - pastoralist zones"
  - name: "Forest Fraction"
    raw: dw_trees_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_trees
    description: "Forest/woodland fraction - remote areas, rebel hideouts"
  - name: "Cropland Fraction"
    raw: dw_crops_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_crops
    description: "Cultivated land fraction - farmer-herder interface"
  - name: "Bare Ground Fraction"
    raw: dw_bare_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_bare
    description: "Bare ground fraction - mining activity proxy"
  - name: "Built-up Fraction"
    raw: dw_built_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_built
    description: "Built-up area fraction"
  - raw: landcover_data_available
    source: DynamicWorld
    transformation: none
    output_col: landcover_data_available

  # ---------------------------------------------------------------------------
  # B. Conflict & Violence (Hard Signals)
  # ---------------------------------------------------------------------------
  # ACLED Event Counts
  - raw: fatalities
    source: ACLED
    transformation: none
    output_col: fatalities_14d_sum
  - raw: acled_count_battles
    source: ACLED
    transformation: none
    output_col: acled_count_battles
  - raw: acled_count_vac
    source: ACLED
    transformation: none
    output_col: acled_count_vac
  - raw: acled_count_explosions
    source: ACLED
    transformation: none
    output_col: acled_count_explosions
  - raw: acled_count_protests
    source: ACLED
    transformation: none
    output_col: acled_count_protests
  - raw: acled_count_riots
    source: ACLED
    transformation: none
    output_col: acled_count_riots
  
  # Lagged Signals
  - raw: protest_count
    source: ACLED
    transformation: lag_1_step
    output_col: protest_count_lag1
  - raw: riot_count
    source: ACLED
    transformation: lag_1_step
    output_col: riot_count_lag1
  - source: ACLED
    raw: regional_risk_score
    transformation: lag_1_step
    output_col: regional_risk_score_lag1

  # GDELT Global Events
  - raw: gdelt_event_count
    source: GDELT
    transformation: decay_90d
    output_col: events_3m_lag
  - raw: gdelt_event_count
    source: GDELT
    transformation: decay_30d
    output_col: gdelt_decay_30d
  - raw: gdelt_predatory_action_count
    source: GDELT
    transformation: decay_30d
    output_col: gdelt_predatory_action_decay_30d
  - raw: gdelt_theme_resource_predation_count
    source: GDELT
    transformation: decay_30d
    output_col: gdelt_theme_resource_predation_decay_30d
  - raw: gdelt_theme_displacement_count
    source: GDELT
    transformation: decay_30d
    output_col: gdelt_theme_displacement_decay_30d
  - raw: gdelt_theme_governance_breakdown_count
    source: GDELT
    transformation: decay_30d
    output_col: gdelt_theme_governance_breakdown_decay_30d
  - raw: gdelt_avg_tone
    source: GDELT
    transformation: decay_30d
    output_col: gdelt_avg_tone_decay_30d
  
  # GDELT National Heat (Aggregated)
  - raw: national_predatory_action_sum
    source: GDELT
    transformation: decay_30d
    output_col: national_predatory_action_sum_decay_30d
  - raw: national_theme_resource_predation_sum
    source: GDELT
    transformation: decay_30d
    output_col: national_theme_resource_predation_sum_decay_30d
  - raw: national_theme_displacement_sum
    source: GDELT
    transformation: decay_30d
    output_col: national_theme_displacement_sum_decay_30d
  - raw: national_theme_governance_breakdown_sum
    source: GDELT
    transformation: decay_30d
    output_col: national_theme_governance_breakdown_sum_decay_30d
  - raw: gdelt_goldstein_mean
    source: GDELT
    transformation: none
    output_col: gdelt_goldstein_mean
  - raw: gdelt_mentions_total
    source: GDELT
    transformation: none
    output_col: gdelt_mentions_total
  - raw: gdelt_data_available
    source: GDELT
    transformation: none
    output_col: gdelt_data_available

  # Infrastructure Outages (IODA)
  - raw: ioda_outage_score
    source: IODA
    transformation: none
    output_col: ioda_outage_score
  - raw: ioda_data_available
    source: IODA
    transformation: none
    output_col: ioda_data_available

  # ---------------------------------------------------------------------------
  # C. NLP & Narrative Signals (Soft Signals)
  # ---------------------------------------------------------------------------
  # CrisisWatch Aggregate
  - raw: cw_score_local
    source: NLP_CrisisWatch
    transformation: none
    output_col: cw_score_local
  - raw: cw_score_local_delta
    source: NLP_CrisisWatch
    transformation: none
    output_col: cw_score_local_delta
  - raw: cw_score_local_delta_decay_14d
    source: NLP_CrisisWatch
    transformation: none
    output_col: cw_score_local_delta_decay_14d
  - raw: narrative_velocity
    source: NLP_CrisisWatch
    transformation: none
    output_col: narrative_velocity
  - raw: narrative_acceleration
    source: NLP_CrisisWatch
    transformation: none
    output_col: narrative_acceleration

  # ACLED Hybrid Mechanisms (current schema)
  - raw: mech_gold_pivot
    source: ACLED_Hybrid
    transformation: none
    output_col: mech_gold_pivot
  - raw: mech_predatory_tax
    source: ACLED_Hybrid
    transformation: none
    output_col: mech_predatory_tax
  - raw: mech_factional_infighting
    source: ACLED_Hybrid
    transformation: none
    output_col: mech_factional_infighting
  - raw: mech_collective_punishment
    source: ACLED_Hybrid
    transformation: none
    output_col: mech_collective_punishment

  # Mechanism uncertainties (if needed downstream)
