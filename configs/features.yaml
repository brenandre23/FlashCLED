# =============================================================================
# FEATURES CONFIGURATION
# =============================================================================
# Diagnostic settings, spatial/temporal definitions, and the master feature registry.

# =============================================================================
# 1. DIAGNOSTICS & EXCLUSIONS
# =============================================================================
diagnostics:
  # Structural break flags: Binary (0/1) columns indicating data availability
  # These are excluded from diagnostics by default when using --exclude-structural-breaks
  structural_break_flags:
    - is_worldpop_v1              # WorldPop V1 vs V2 methodology
    - iom_data_available          # IOM DTM coverage start (2015-01-31)
    - econ_data_available         # Yahoo Finance coverage start (2003-12-01)
    - ioda_data_available         # IODA monitoring start (2022-02-01)
    - ioda_data_available
    - landcover_data_available    # Dynamic World start (2015-06-27)
    - viirs_data_available        # VIIRS coverage start (2012-01-28)
    - gdelt_data_available        # GDELT v2 coverage start (2015)
    - gdelt_data_available
    - food_data_available         # FEWS NET food price coverage
  
  # Additional columns to always exclude from diagnostics
  exclude_from_diagnostics: []
  
  # Thresholds for diagnostic flagging
  thresholds:
    vif_warning: 5.0              # VIF > 5 = moderate collinearity
    vif_severe: 10.0              # VIF > 10 = severe collinearity
    correlation_warning: 0.7      # |rho| > 0.7 = moderate correlation
    correlation_severe: 0.9       # |rho| > 0.9 = severe correlation
    condition_number: 30.0        # Condition number > 30 = ill-conditioned

# =============================================================================
# 2. SPATIAL & TEMPORAL DEFINITIONS
# =============================================================================
spatial:
  crs:
    metric: EPSG:32634
    geodetic: EPSG:4326
  h3_resolution: 5
  buffer_km: 8.5
  admin_columns:
    admin1: NAM_1
    admin2: NAM_2
    admin3: adm2_ref_name

temporal:
  base_unit: step
  step_days: 14
  alignment_date: '2000-01-01'
  decays:
    half_life_30d:
      steps: 2.14
    half_life_90d:
      steps: 6.43
  
  # Publication lags by source (in steps)
  # Applied at ingestion to ensure operational validity
  publication_lags:
    GEE: 1              # ERA5 ~5-7 days, CHIRPS ~2-3 days
    DynamicWorld: 1     # Sentinel-2 ~2-5 days latency
    CHIRPS: 1
    ERA5: 1
    MODIS: 1
    VIIRS: 1
    JRC_Landsat: 1
    ACLED: 1            # ~6 day weekly release cycle
    ACLED_Hybrid: 1
    GDELT: 0            # Near real-time (<1 hour)
    Food_Security: 4    # ~45-60 day delay
    IOM_DTM: 2          # ~2-4 week delay
    Economy: 1          # End-of-day close
    IODA: 0             # Near real-time
    EPR: 0              # Static/historical
    WorldPop: 0         # Annual static
    Static_Geography: 0

# =============================================================================
# 3. IMPUTATION RULES
# =============================================================================
imputation:
  defaults:
    method: "forward_fill"
    limit: 4  # Global fallback (approx 2 months)
  domains:
    environmental:
      limit: 2  # Short: Weather/NDVI change rapidly (approx 1 month)
    economic:
      limit: 8  # Medium: Market prices (approx 4 months)
    conflict:
      limit: 3  # Medium-Short: News/Sentiment decays faster (approx 1.5 months)
    social:
      limit: 12 # Long: Displacement (IOM) is structural; updated quarterly (approx 6 months)

# =============================================================================
# 4. FEATURE REGISTRY
# =============================================================================
registry:

  # ---------------------------------------------------------------------------
  # A. Environmental Drivers (Climate, Land, Light)
  # ---------------------------------------------------------------------------
  # Precipitation (CHIRPS)
  - raw: precip_mean_depth_mm
    source: CHIRPS
    transformation: anomaly
    output_col: chirps_precip_anomaly
  - raw: precip_mean_depth_mm
    source: CHIRPS
    transformation: mean
    output_col: chirps_precip_mean
  
  # Temperature & Moisture (ERA5)
  - raw: temp_mean
    source: ERA5
    transformation: anomaly
    output_col: era5_temp_anomaly
  - raw: temp_mean
    source: ERA5
    transformation: mean
    output_col: era5_temp_mean
  - raw: dew_mean
    source: ERA5
    transformation: anomaly
    output_col: era5_dewpoint_anomaly
  - raw: dew_mean
    source: ERA5
    transformation: mean
    output_col: era5_dewpoint_mean
  - raw: soil_moisture_mean
    source: ERA5
    transformation: anomaly
    output_col: era5_soil_moisture_anomaly
  - raw: soil_moisture_mean
    source: ERA5
    transformation: mean
    output_col: era5_soil_moisture_mean
  
  # Vegetation & Light (MODIS, VIIRS)
  - raw: ndvi_max
    source: MODIS
    transformation: anomaly
    output_col: ndvi_anomaly
  - raw: ndvi_max
    source: MODIS
    transformation: mean
    output_col: ndvi_max
  - raw: ntl_mean
    source: VIIRS
    transformation: mean
    output_col: nightlights_intensity
  - raw: ntl_mean
    source: VIIRS
    transformation: availability_flag
    output_col: viirs_data_available
    description: "1 if date >= 2012-01-28 (VIIRS coverage start), else 0"

  # Surface Water (JRC)
  - raw: water_local_max
    source: JRC_Landsat
    transformation: none
    output_col: water_local_max
  - raw: water_local_mean
    source: JRC_Landsat
    transformation: none
    output_col: water_local_mean

  # Land Cover Fractions (Dynamic World)
  - name: "Grassland Fraction"
    raw: dw_grass_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_grass
    description: "Grassland/savanna fraction - pastoralist zones"
  - name: "Forest Fraction"
    raw: dw_trees_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_trees
    description: "Forest/woodland fraction - remote areas, rebel hideouts"
  - name: "Cropland Fraction"
    raw: dw_crops_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_crops
    description: "Cultivated land fraction - farmer-herder interface"
  - name: "Bare Ground Fraction"
    raw: dw_bare_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_bare
    description: "Bare ground fraction - mining activity proxy"
  - name: "Built-up Fraction"
    raw: dw_built_frac
    source: DynamicWorld
    transformation: mean
    output_col: landcover_built
    description: "Built-up area fraction"
  - raw: landcover_data_available
    source: DynamicWorld
    transformation: none
    output_col: landcover_data_available

  # ---------------------------------------------------------------------------
  # B. Conflict & Violence (Hard Signals)
  # ---------------------------------------------------------------------------
  # ACLED Event Counts
  - raw: fatalities
    source: ACLED
    transformation: none
    output_col: fatalities_14d_sum
  - raw: acled_count_battles
    source: ACLED
    transformation: none
    output_col: acled_count_battles
  - raw: acled_count_vac
    source: ACLED
    transformation: none
    output_col: acled_count_vac
  - raw: acled_count_explosions
    source: ACLED
    transformation: none
    output_col: acled_count_explosions
  - raw: acled_count_protests
    source: ACLED
    transformation: none
    output_col: acled_count_protests
  - raw: acled_count_riots
    source: ACLED
    transformation: none
    output_col: acled_count_riots
  
  # Lagged Signals
  - raw: protest_count
    source: ACLED
    transformation: lag_1_step
    output_col: protest_count_lag1
  - raw: riot_count
    source: ACLED
    transformation: lag_1_step
    output_col: riot_count_lag1
  - source: ACLED
    raw: regional_risk_score
    transformation: lag_1_step
    output_col: regional_risk_score_lag1

  # GDELT Global Events
  - raw: gdelt_event_count
    source: GDELT
    transformation: decay_90d
    output_col: events_3m_lag
  - raw: gdelt_event_count
    source: GDELT
    transformation: decay_30d
    output_col: gdelt_decay_30d
  - raw: gdelt_avg_tone
    source: GDELT
    transformation: decay_30d
    output_col: gdelt_avg_tone_decay_30d
  - raw: gdelt_goldstein_mean
    source: GDELT
    transformation: none
    output_col: gdelt_goldstein_mean
  - raw: gdelt_mentions_total
    source: GDELT
    transformation: none
    output_col: gdelt_mentions_total
  - raw: gdelt_data_available
    source: GDELT
    transformation: none
    output_col: gdelt_data_available

  # Infrastructure Outages (IODA)
  - raw: ioda_outage_score
    source: IODA
    transformation: none
    output_col: ioda_outage_score
  - raw: ioda_data_available
    source: IODA
    transformation: none
    output_col: ioda_data_available

  # ---------------------------------------------------------------------------
  # C. NLP & Narrative Signals (Soft Signals)
  # ---------------------------------------------------------------------------
  # CrisisWatch Aggregate
  - raw: cw_score_local
    source: NLP_CrisisWatch
    transformation: none
    output_col: cw_score_local
  
  # CrisisWatch Topic Pivots
  - name: "CrisisWatch Topic: Rebel Coalition"
    source: "NLP_CrisisWatch"
    raw: "cw_topic_id"
    transformation: "pivot_topic"
    output_col: "cw_rebel_coalition"
    transformation_params:
      topic_id: 0
      value_column: "spatial_confidence"
  - name: "CrisisWatch Topic: Transhumance Militia"
    source: "NLP_CrisisWatch"
    raw: "cw_topic_id"
    transformation: "pivot_topic"
    output_col: "cw_transhumance_militia"
    transformation_params:
      topic_id: 1
      value_column: "spatial_confidence"
  - name: "CrisisWatch Topic: Resource Predation"
    source: "NLP_CrisisWatch"
    raw: "cw_topic_id"
    transformation: "pivot_topic"
    output_col: "cw_resource_predation"
    transformation_params:
      topic_id: 2
      value_column: "spatial_confidence"
  - name: "CrisisWatch Topic: Foreign Influence"
    source: "NLP_CrisisWatch"
    raw: "cw_topic_id"
    transformation: "pivot_topic"
    output_col: "cw_foreign_influence"
    transformation_params:
      topic_id: 3
      value_column: "spatial_confidence"
  - name: "CrisisWatch Topic: State Vacuum"
    source: "NLP_CrisisWatch"
    raw: "cw_topic_id"
    transformation: "pivot_topic"
    output_col: "cw_state_vacuum"
    transformation_params:
      topic_id: 4
      value_column: "spatial_confidence"
  - name: "CrisisWatch Topic: Sectarian Cleansing"
    source: "NLP_CrisisWatch"
    raw: "cw_topic_id"
    transformation: "pivot_topic"
    output_col: "cw_sectarian_cleansing"
    transformation_params:
      topic_id: 5
      value_column: "spatial_confidence"

  # ACLED Hybrid Drivers (NLP + Regex)
  - raw: driver_resource_cattle
    source: ACLED_Hybrid
    transformation: none
    output_col: driver_resource_cattle
  - raw: driver_resource_mining
    source: ACLED_Hybrid
    transformation: none
    output_col: driver_resource_mining
  - raw: driver_econ_taxation
    source: ACLED_Hybrid
    transformation: none
    output_col: driver_econ_taxation
  - raw: driver_civilian_abuse
    source: ACLED_Hybrid
    transformation: none
    output_col: driver_civilian_abuse
  - raw: driver_political_coup
    source: ACLED_Hybrid
    transformation: none
    output_col: driver_political_coup

  # ---------------------------------------------------------------------------
  # D. Economic Drivers
  # ---------------------------------------------------------------------------
  # Macro-Economics (Global)
  - raw: gold_price_usd
    source: Economy
    transformation: lag_1_step
    output_col: gold_price_usd_lag1
  - raw: oil_price_usd
    source: Economy
    transformation: lag_1_step
    output_col: oil_price_usd_lag1
  - raw: sp500_index
    source: Economy
    transformation: lag_1_step
    output_col: sp500_index_lag1
  - raw: eur_usd_rate
    source: Economy
    transformation: lag_1_step
    output_col: eur_usd_rate_lag1
  - raw: econ_data_available
    source: Economy
    transformation: none
    output_col: econ_data_available

  # Food Security (Local Market Prices)
  - raw: price_maize
    source: Food_Security
    transformation: none
    output_col: price_maize
  - raw: price_rice
    source: Food_Security
    transformation: none
    output_col: price_rice
  - raw: price_oil
    source: Food_Security
    transformation: none
    output_col: price_oil
  - raw: price_sorghum
    source: Food_Security
    transformation: none
    output_col: price_sorghum
  - raw: price_cassava
    source: Food_Security
    transformation: none
    output_col: price_cassava
  - raw: price_groundnuts
    source: Food_Security
    transformation: none
    output_col: price_groundnuts
  
  # Food Price Shocks (Anomalies)
  - raw: price_maize
    source: Food_Security
    transformation: shock_12m
    transformation_params:
      lookback_months: 12
    output_col: price_maize_shock
  - raw: price_rice
    source: Food_Security
    transformation: shock_12m
    transformation_params:
      lookback_months: 12
    output_col: price_rice_shock
  - raw: price_oil
    source: Food_Security
    transformation: shock_12m
    transformation_params:
      lookback_months: 12
    output_col: price_oil_shock
  - raw: price_sorghum
    source: Food_Security
    transformation: shock_12m
    transformation_params:
      lookback_months: 12
    output_col: price_sorghum_shock
  - raw: price_cassava
    source: Food_Security
    transformation: shock_12m
    transformation_params:
      lookback_months: 12
    output_col: price_cassava_shock
  - raw: price_groundnuts
    source: Food_Security
    transformation: shock_12m
    transformation_params:
      lookback_months: 12
    output_col: price_groundnuts_shock
  
  # Food Index & Flags
  - raw: food_price_index
    source: Food_Security
    transformation: none
    output_col: food_price_index
  - raw: food_data_available
    source: Food_Security
    transformation: none
    output_col: food_data_available

  # ---------------------------------------------------------------------------
  # E. Social & Demographic
  # ---------------------------------------------------------------------------
  # Ethnic Power Relations (EPR)
  - raw: epr_excluded_groups_count
    source: EPR
    transformation: none
    output_col: epr_excluded_groups_count
  - raw: epr_discriminated_groups_count
    source: EPR
    transformation: none
    output_col: epr_discriminated_groups_count
  - raw: epr_status_mean
    source: EPR
    transformation: none
    output_col: epr_status_mean
  - raw: ethnic_group_count
    source: EPR
    transformation: none
    output_col: ethnic_group_count

  # Displacement (IOM)
  - raw: iom_displacement_sum
    source: IOM_DTM
    transformation: lag_1_step
    output_col: iom_displacement_count_lag1
  - raw: iom_data_available
    source: IOM_DTM
    transformation: none
    output_col: iom_data_available
    description: "IOM coverage flag (1 on/after 2018-01-31, else 0)"

  # Population (WorldPop)
  - raw: pop_count
    source: WorldPop
    transformation: log1p
    output_col: pop_log
  - raw: is_worldpop_v1
    source: WorldPop
    transformation: none
    output_col: is_worldpop_v1
    description: 'Structural break flag: 1 for pre-2015 WorldPop (V1), 0 otherwise.'

  # ---------------------------------------------------------------------------
  # F. Static Geography & Infrastructure
  # ---------------------------------------------------------------------------
  # Distances
  - raw: dist_to_capital
    source: Static_Geography
    transformation: none
    output_col: dist_to_capital
  - raw: dist_to_border
    source: Static_Geography
    transformation: none
    output_col: dist_to_border
  - raw: dist_to_road
    source: GRIP4
    transformation: none
    output_col: dist_to_road
  - raw: dist_to_city
    source: OSM_Settlements
    transformation: none
    output_col: dist_to_city
  - raw: dist_to_market_km
    source: Static_Geography
    transformation: none
    output_col: dist_to_market_km
  - raw: dist_to_river
    source: HydroRIVERS
    transformation: none
    output_col: dist_to_river

  # Mining Infrastructure
  - raw: dist_to_diamond_mine
    source: IPIS_Mines
    transformation: none
    output_col: dist_to_diamond_mine
  - raw: dist_to_large_mine
    source: IPIS_Mines
    transformation: none
    output_col: dist_to_large_mine
  - raw: dist_to_controlled_mine
    source: IPIS_Mines
    transformation: none
    output_col: dist_to_controlled_mine
  - raw: dist_to_large_gold_mine
    source: IPIS_Mines
    transformation: none
    output_col: dist_to_large_gold_mine
  - raw: dist_to_gold_mine
    source: IPIS_Mines
    transformation: none
    output_col: dist_to_gold_mine

  # Terrain
  - raw: terrain_ruggedness_index
    source: Copernicus_DEM
    transformation: none
    output_col: terrain_ruggedness_index
  - raw: elevation_mean
    source: Copernicus_DEM
    transformation: none
    output_col: elevation_mean
  - raw: slope_mean
    source: Copernicus_DEM
    transformation: none
    output_col: slope_mean

  # ---------------------------------------------------------------------------
  # G. Temporal Context
  # ---------------------------------------------------------------------------
  - raw: month_sin
    source: Temporal
    transformation: none
    output_col: month_sin
  - raw: month_cos
    source: Temporal
    transformation: none
    output_col: month_cos
  - raw: is_dry_season
    source: Temporal
    transformation: none
    output_col: is_dry_season