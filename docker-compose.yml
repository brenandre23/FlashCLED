version: '3.8'

services:
  web:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      # NETWORKING: Hardcoded WSL Gateway IP (Verified TCP connection)
      # NOTE: If DB connection fails after reboot, check 'ipconfig' and update this IP.
      DB_HOST: 172.31.48.1
      DB_PORT: 5433

      # SECURITY: Credentials must be loaded from .env file (no defaults provided)
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_SCHEMA: ${DB_SCHEMA:-car_cewp}
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Optional: Local PostGIS instance (Isolated from Windows host)
  # Mapped to port 5434 to avoid conflict with host Postgres on 5433
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    command: ["-c", "shared_buffers=512MB", "-c", "work_mem=16MB"]
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: